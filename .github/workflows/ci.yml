name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test ${{ matrix.os }} / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo test
        run: cargo test
        env:
          PYO3_PYTHON: python
      - name: install + build (Rust core via the maturin backend)
        run: |
          pip install pytest pyhocon
          pip install .
      - name: pytest (iso vs pyhocon)
        run: pytest tests/ -q
